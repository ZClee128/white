name: Build iOS Project

# 使用方式：
# GitHub Actions → Build iOS Project → Run workflow
# 填入项目 scheme 名称，系统自动加载对应账号的证书和配置

on:
  workflow_dispatch:
    inputs:
      project:
        description: |
          要打包的项目 scheme 名称：
          chengbao / bijiben / jinju / dongman / zhangshang / jieji
        required: true
        type: string
      upload_to_appstore:
        description: '是否上传到 App Store Connect'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  resolve:
    name: Resolve Project Info
    runs-on: ubuntu-latest
    outputs:
      working_directory: ${{ steps.resolve.outputs.working_directory }}
      project_name: ${{ steps.resolve.outputs.project_name }}
      scheme_name: ${{ steps.resolve.outputs.scheme_name }}
      bundle_id: ${{ steps.resolve.outputs.bundle_id }}
      provisioning_profile_name: ${{ steps.resolve.outputs.provisioning_profile_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve project path and bundle_id
        id: resolve
        run: |
          SCHEME="${{ github.event.inputs.project }}"

          PROJ_PATH=$(find . -name "${SCHEME}.xcodeproj" -type d | head -1)
          if [ -z "$PROJ_PATH" ]; then
            echo "❌ 未找到项目: ${SCHEME}.xcodeproj"
            echo "可用项目:"
            find . -name "*.xcodeproj" -type d | sort | sed 's/.*\///' | sed 's/\.xcodeproj//'
            exit 1
          fi

          WORKDIR=$(dirname "$PROJ_PATH")
          WORKDIR="${WORKDIR#./}"
          PROJECT_NAME="${SCHEME}.xcodeproj"

          PBXPROJ="${PROJ_PATH}/project.pbxproj"
          BUNDLE_ID=""
          if [ -f "$PBXPROJ" ]; then
            BUNDLE_ID=$(grep -m1 "PRODUCT_BUNDLE_IDENTIFIER" "$PBXPROJ" | sed 's/.*= //;s/;//;s/ //')
          fi

          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID="com.placeholder.${SCHEME}"
          fi

          echo "working_directory=$WORKDIR" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "scheme_name=$SCHEME" >> $GITHUB_OUTPUT
          echo "bundle_id=$BUNDLE_ID" >> $GITHUB_OUTPUT
          echo "provisioning_profile_name=$SCHEME" >> $GITHUB_OUTPUT

          echo "✅ 项目路径: $WORKDIR/$PROJECT_NAME"
          echo "✅ Bundle ID: $BUNDLE_ID"
          echo "✅ Environment: $SCHEME"

  build:
    name: Build ${{ needs.resolve.outputs.scheme_name }}
    needs: resolve
    uses: ./.github/workflows/reusable-ios-build.yml
    with:
      working_directory: ${{ needs.resolve.outputs.working_directory }}
      project_name: ${{ needs.resolve.outputs.project_name }}
      scheme_name: ${{ needs.resolve.outputs.scheme_name }}
      bundle_id: ${{ needs.resolve.outputs.bundle_id }}
      provisioning_profile_name: ${{ needs.resolve.outputs.provisioning_profile_name }}
      # environment_name 与 scheme 同名，对应 GitHub 上配置的 Environment
      # 每个 Environment 存储该项目独立的 Apple 账号和证书
      environment_name: ${{ github.event.inputs.project }}
      configuration: 'Release'
      xcode_version: 'latest-stable'
      upload_to_appstore: ${{ github.event.inputs.upload_to_appstore == 'true' }}
